<h1>Admin</h1>
{{flash}}
<section class="admin-toolbar">
  <form method="post" action="/admin/group/add" class="inline" aria-label="Add group">
    <input type="text" name="name" placeholder="New group name" required>
    <button type="submit" class="btn-compact">Add group</button>
  </form>
  <form method="post" action="/admin/import-opml" enctype="multipart/form-data" class="inline" aria-label="Import OPML">
    <input type="file" name="opml" accept=".opml,.xml,application/xml,text/xml" required>
    <button type="submit" class="btn-compact">Import OPML</button>
  </form>
</section>
{{groups}}
<datalist id="feed-suggestions"></datalist>
<script>
// Bind every group's "Add feed" input to the shared <datalist> and
// query /admin/feed-search as the user types. 250ms debounce keeps us
// off the wire while they're still typing; <3 chars short-circuits.
(function () {
  var timer;
  var dl = document.getElementById('feed-suggestions');

  function update(query) {
    fetch('/admin/feed-search?q=' + encodeURIComponent(query))
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (items) {
        dl.innerHTML = '';
        items.forEach(function (it) {
          var opt = document.createElement('option');
          opt.value = it.url;
          opt.label = it.title || it.url;
          dl.appendChild(opt);
        });
      })
      .catch(function () { /* network errors: leave the list as-is */ });
  }

  function onInput(e) {
    clearTimeout(timer);
    var q = e.target.value.trim();
    if (q.length < 3) { return; }
    timer = setTimeout(function () { update(q); }, 250);
  }

  document.querySelectorAll('input[name="url"]').forEach(function (inp) {
    inp.setAttribute('list', 'feed-suggestions');
    inp.setAttribute('autocomplete', 'off');
    inp.addEventListener('input', onInput);
  });
})();
</script>
