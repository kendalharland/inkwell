rss:
  groups:
    - name: "Hobbies & tech"
      feeds:
        - https://news.ycombinator.com/rss
        - https://lobste.rs/rss
    - name: "Top stories"
      feeds:
        - https://feeds.bbci.co.uk/news/world/rss.xml

# Background jobs run via the honker SQLite scheduler. The same
# reader_cache.sqlite file is reused — no separate datastore.
#
# Cron expressions accept any of:
#   "0 3 * * *"       5-field standard cron (min hr dom mon dow)
#   "*/2 * * * * *"   6-field with leading seconds
#   "@every 10m"      simple interval
scheduler:
  # Refresh every feed and pre-extract any newly-seen articles.
  refresh: "@every 10m"
  # Delete cached articles older than article_ttl_days.
  purge: "0 3 * * *"
  article_ttl_days: 30
  # Errors and job activity are appended here. Created if missing.
  log_file: ./inkwell.log

# Optional. UI density.
view:
  compact_default: false

# Optional. Discovery providers used by the admin UI's autocomplete
# when adding a new feed. The default — link_auto_discovery —
# fetches the user's URL and scrapes <link rel="alternate"> tags out
# of the markup; works for any site that advertises its feeds that
# way (most do). Extra providers can be listed alongside it.
#
# `feedsearch` (feedsearch.dev) is shipped but currently fronted by a
# Cloudflare challenge that blocks server-side calls; leave it out
# unless you have a route around it.
feed_search:
  providers:
    - kind: link_auto_discovery

# Optional. Serve the same content over the Gemini protocol on TLS.
# Cert + key are generated on first launch if the files don't exist;
# Gemini clients use TOFU so keep them stable across restarts.
gemini:
  bind: "0.0.0.0:1965"
  cert_pem: "./gemini.cert.pem"
  key_pem: "./gemini.key.pem"
  hostnames:
    - localhost
