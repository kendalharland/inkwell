name: publish

# Build the inkwell image and push it to Codeberg's built-in container
# registry on every push to main that changes code.
#
# Codeberg's shared runners expose the docker CLI but no daemon
# socket, so this workflow uses buildah (installed via apt) as the
# builder. Buildah is daemon-less and handles the standard Dockerfile
# in the repo without needing BuildKit.

on:
  push:
    branches: [main]

jobs:
  image:
    runs-on: codeberg-medium
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: codeberg.org
      IMAGE: codeberg.org/kendal/inkwell
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install buildah
        run: |
          set -euo pipefail
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            buildah ca-certificates
          buildah --version

      - name: Log in to Codeberg registry
        env:
          # `github.token` on Forgejo scopes to this repo. Combined
          # with the `packages: write` permission above, it can push
          # to the built-in container registry as the invoking user.
          TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$TOKEN" | buildah login \
            --username "$GITHUB_ACTOR" \
            --password-stdin \
            "$REGISTRY"

      - name: Build image
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          # --isolation=chroot avoids requiring user namespaces, which
          # can be finicky inside a CI container.
          buildah build \
            --isolation=chroot \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$SHORT_SHA" \
            .

      - name: Push image
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          buildah push "$IMAGE:latest"
          buildah push "$IMAGE:$SHORT_SHA"
