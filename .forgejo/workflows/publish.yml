name: publish

on:
  push:
    branches: [main]

jobs:
  probe:
    runs-on: codeberg-medium
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: What's on the runner
        run: |
          set -x
          uname -a
          id
          echo "PATH=$PATH"
          for cmd in docker podman buildah nerdctl kaniko skopeo; do
            command -v "$cmd" && "$cmd" --version 2>&1 | head -1 || echo "  $cmd: not found"
          done
          command -v runc && runc --version 2>&1 | head -1 || echo "runc: not found"
          ls -la /var/run/docker.sock 2>&1 || true
          ls -la /run/podman/podman.sock 2>&1 || true
