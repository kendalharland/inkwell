name: publish

on:
  push:
    branches: [main]

jobs:
  image:
    runs-on: codeberg-medium
    permissions:
      contents: write
      packages: write
    env:
      REGISTRY: codeberg.org
      IMAGE: codeberg.org/kendal/inkwell
      # `vfs` is slower than `overlay` but works on any filesystem,
      # including the overlayfs the CI container itself runs on. The
      # overlay driver requires fuse-overlayfs, which isn't installed
      # on Codeberg's shared runners.
      STORAGE_DRIVER: vfs
      BUILDAH_ISOLATION: chroot
      # Pin the auth file so `buildah login` and `buildah push` share
      # the same credentials store regardless of storage-driver
      # differences that would otherwise split their default paths.
      REGISTRY_AUTH_FILE: /tmp/auth.json
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Build and push (with log capture)
        id: build
        continue-on-error: true
        env:
          TOKEN: ${{ github.token }}
        run: |
          set -x
          exec > >(tee -a /tmp/publish.log) 2>&1

          echo "===== install buildah ====="
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            buildah ca-certificates
          buildah --version

          echo "===== login ====="
          printf '%s' "$TOKEN" | buildah login \
            --storage-driver "$STORAGE_DRIVER" \
            --username "$GITHUB_ACTOR" \
            --password-stdin \
            "$REGISTRY"

          echo "===== inspect auth ====="
          ls -la "$REGISTRY_AUTH_FILE" || echo "no auth file at $REGISTRY_AUTH_FILE"
          cat "$REGISTRY_AUTH_FILE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print("hosts:", list(d.get("auths",{}).keys()))' || true

          echo "===== build ====="
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          buildah build \
            --storage-driver "$STORAGE_DRIVER" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$SHORT_SHA" \
            .

          echo "===== push ====="
          buildah push \
            --storage-driver "$STORAGE_DRIVER" \
            --creds "$GITHUB_ACTOR:$TOKEN" \
            "$IMAGE:latest"
          buildah push \
            --storage-driver "$STORAGE_DRIVER" \
            --creds "$GITHUB_ACTOR:$TOKEN" \
            "$IMAGE:$SHORT_SHA"

      - name: Publish log to publish-log branch
        if: always()
        env:
          TOKEN: ${{ github.token }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          mkdir -p /tmp/logdir
          cp /tmp/publish.log /tmp/logdir/PUBLISH.log || echo "no log captured" > /tmp/logdir/PUBLISH.log
          cd /tmp/logdir
          git init -q -b publish-log
          git config user.email "ci@codeberg.org"
          git config user.name "Codeberg CI"
          git add PUBLISH.log
          git commit -q -m "Log from ${GITHUB_SHA:0:7}"
          git push -q --force \
            "https://x-access-token:${TOKEN}@${REPO_URL#https://}" \
            publish-log

      - name: Fail job if the build step failed
        if: steps.build.outcome == 'failure'
        run: exit 1
