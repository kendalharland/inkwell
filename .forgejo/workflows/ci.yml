name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: codeberg-medium
    steps:
      - uses: https://github.com/actions/checkout@v4

      - uses: https://github.com/actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - uses: https://github.com/Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check

      # Compile and run are split so each gets its own 10-min runner
      # budget. The combined cold build (with image / quick-xml / axum
      # and friends) brushes up against the per-step limit, and once
      # one run completes the Swatinem rust-cache step above keeps
      # subsequent runs fast.
      - run: cargo test --workspace --locked --no-run
      - run: cargo test --workspace --locked
